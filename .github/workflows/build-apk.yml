name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web app
        run: |
          export BASE_PATH=/
          export PORT=3000
          pnpm --filter @workspace/monopoli run build
        env:
          NODE_ENV: production

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Capacitor sync Android
        working-directory: artifacts/monopoli
        run: |
          if [ ! -d "android" ]; then
            cap add android
          fi
          cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            artifacts/monopoli/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/monopoli/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: artifacts/monopoli/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: monopoli-debug-${{ github.run_number }}
          path: artifacts/monopoli/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build release APK (signed)
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_BASE64 != ''
        working-directory: artifacts/monopoli/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Upload release APK
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: monopoli-release-${{ github.run_number }}
          path: artifacts/monopoli/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
